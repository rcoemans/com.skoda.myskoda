<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script type="text/javascript" src="/homey.js" data-origin="widget"></script>
  <style>
    :root {
      color-scheme: light dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
      color: var(--homey-color-text, #ffffff);
    }

    .widget {
      min-height: 100vh;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        radial-gradient(circle at top right, rgba(14, 58, 47, 0.22), transparent 45%),
        linear-gradient(180deg, rgba(14, 58, 47, 0.20), rgba(14, 58, 47, 0.08));
      border-radius: 18px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 2px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .connection {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.12);
      text-transform: capitalize;
      white-space: nowrap;
    }

    .connection.online {
      background: rgba(44, 187, 99, 0.18);
      color: #6cf0a1;
    }

    .connection.offline,
    .connection.unknown {
      background: rgba(255, 255, 255, 0.12);
    }

    .hero {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
    }

    .battery {
      position: relative;
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }

    .battery img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .charging-overlay {
      position: absolute;
      right: -2px;
      top: -2px;
      width: 18px !important;
      height: 18px !important;
      padding: 3px;
      border-radius: 999px;
      background: rgba(14, 58, 47, 0.95);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    .battery-value {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .battery-unit {
      font-size: 15px;
      font-weight: 600;
      opacity: 0.7;
    }

    .hero-subtitle {
      margin-top: 6px;
      font-size: 14px;
      opacity: 0.82;
      text-transform: capitalize;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      min-width: 0;
    }

    .metric-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.95;
    }

    .metric-text {
      min-width: 0;
    }

    .metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.65;
    }

    .metric-value {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: capitalize;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: auto;
      font-size: 12px;
      opacity: 0.72;
    }

    .address {
      max-width: calc(100% - 110px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      min-height: 40px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      color: inherit;
      background: rgba(255, 255, 255, 0.10);
      transition: transform 120ms ease, background 120ms ease, opacity 120ms ease;
    }

    .button.primary {
      background: #0E3A2F;
      color: #ffffff;
    }

    .button:active {
      transform: scale(0.98);
    }

    .button[disabled] {
      opacity: 0.45;
    }

    .message {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
      padding: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 420px) {
      .title {
        font-size: 18px;
      }

      .battery-value {
        font-size: 28px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
      }

      .address {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div id="message" class="message">Loading widget…</div>

    <div id="content" class="hidden">
      <div class="header">
        <div class="title-block">
          <div class="eyebrow">MyŠkoda</div>
          <div class="title" id="vehicle-name">Vehicle</div>
        </div>
        <div class="connection" id="connection-status">Unknown</div>
      </div>

      <div class="hero">
        <div class="battery">
          <img id="battery-icon" src="./public/icons/battery-0.svg" alt="Battery">
          <img id="charging-icon" class="charging-overlay hidden" src="./public/icons/charging.svg" alt="Charging">
        </div>
        <div>
          <div class="battery-value">
            <span id="battery-percent">--</span>
            <span class="battery-unit">%</span>
          </div>
          <div class="hero-subtitle" id="hero-subtitle">Vehicle status unavailable</div>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <img class="metric-icon" src="./public/icons/range.svg" alt="Range">
          <div class="metric-text">
            <div class="metric-label">Range</div>
            <div class="metric-value" id="range-value">-- km</div>
          </div>
        </div>
        <div class="metric">
          <img class="metric-icon" id="lock-icon" src="./public/icons/unlock.svg" alt="Lock state">
          <div class="metric-text">
            <div class="metric-label">Lock</div>
            <div class="metric-value" id="lock-value">Unknown</div>
          </div>
        </div>
        <div class="metric">
          <img class="metric-icon" src="./public/icons/plug.svg" alt="Plug state">
          <div class="metric-text">
            <div class="metric-label">Plug</div>
            <div class="metric-value" id="plug-value">Unknown</div>
          </div>
        </div>
        <div class="metric">
          <img class="metric-icon" src="./public/icons/climate.svg" alt="Climate state">
          <div class="metric-text">
            <div class="metric-label">Climate</div>
            <div class="metric-value" id="climate-value">Unknown</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="refresh-button" class="button" type="button">Refresh</button>
        <button id="charging-button" class="button primary" type="button">Charging</button>
        <button id="climate-button" class="button" type="button">Climate</button>
      </div>

      <div class="footer">
        <div class="address" id="parking-address">No parking address</div>
        <div id="last-updated">Updated: --</div>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    let HomeyInstance;
    let currentState = null;
    let refreshTimer = null;

    function getDeviceId() {
      const ids = typeof HomeyInstance.getDeviceIds === 'function' ? HomeyInstance.getDeviceIds() : [];
      return Array.isArray(ids) && ids.length > 0 ? ids[0] : null;
    }

    function getWidgetSettings() {
      return typeof HomeyInstance.getSettings === 'function' ? (HomeyInstance.getSettings() || {}) : {};
    }

    function setMessage(text) {
      document.getElementById('message').textContent = text;
      document.getElementById('message').classList.remove('hidden');
      document.getElementById('content').classList.add('hidden');
    }

    function showContent() {
      document.getElementById('message').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
    }

    function getBatteryIcon(level) {
      if (level === null || level === undefined || Number.isNaN(Number(level))) return './public/icons/battery-0.svg';
      if (level <= 10) return './public/icons/battery-0.svg';
      if (level <= 25) return './public/icons/battery-1.svg';
      if (level <= 40) return './public/icons/battery-2.svg';
      if (level <= 60) return './public/icons/battery-3.svg';
      if (level <= 80) return './public/icons/battery-4.svg';
      return './public/icons/battery-5.svg';
    }

    function humanizeCharging(state) {
      if (!state) return 'Unknown';
      return String(state).replace(/_/g, ' ').replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function textOrFallback(value, fallback) {
      return value === null || value === undefined || value === '' ? fallback : String(value);
    }

    function renderState(state) {
      currentState = state;
      const settings = getWidgetSettings();
      const batteryPercent = state.batteryPercent ?? '--';
      const charging = Boolean(state.isCharging);
      const chargingLabel = humanizeCharging(state.chargingState);
      const lastUpdatedText = state.lastUpdated ? `Updated: ${state.lastUpdated}` : 'Updated: --';
      const parkingAddress = settings.show_location === false ? 'Parking address hidden' : textOrFallback(state.parkingAddress, 'No parking address');

      document.getElementById('vehicle-name').textContent = textOrFallback(state.name, 'MyŠkoda');
      document.getElementById('connection-status').textContent = textOrFallback(state.connectionStatus, 'unknown');
      document.getElementById('connection-status').className = `connection ${String(state.connectionStatus || 'unknown').toLowerCase()}`;
      document.getElementById('battery-percent').textContent = batteryPercent;
      document.getElementById('hero-subtitle').textContent = charging
        ? `${chargingLabel}${state.chargePowerKw ? ` · ${state.chargePowerKw} kW` : ''}`
        : chargingLabel;
      document.getElementById('battery-icon').src = getBatteryIcon(Number(state.batteryPercent));
      document.getElementById('charging-icon').classList.toggle('hidden', !charging);
      document.getElementById('range-value').textContent = state.rangeKm !== null && state.rangeKm !== undefined ? `${state.rangeKm} km` : '-- km';
      document.getElementById('lock-value').textContent = textOrFallback(state.lockLabel, 'Unknown');
      document.getElementById('lock-icon').src = state.locked ? './public/icons/lock.svg' : './public/icons/unlock.svg';
      document.getElementById('plug-value').textContent = textOrFallback(state.plugLabel, 'Unknown');
      document.getElementById('climate-value').textContent = state.climateActive
        ? `Active${state.outsideTemperatureC !== null && state.outsideTemperatureC !== undefined ? ` · ${state.outsideTemperatureC}°C` : ''}`
        : 'Off';
      document.getElementById('parking-address').textContent = parkingAddress;
      document.getElementById('last-updated').textContent = lastUpdatedText;
      document.getElementById('charging-button').textContent = charging ? 'Stop Charging' : 'Start Charging';
      document.getElementById('climate-button').textContent = state.climateActive ? 'Stop Climate' : 'Start Climate';
      showContent();
    }

    async function fetchState() {
      const deviceId = getDeviceId();
      if (!deviceId) {
        setMessage('Select a MyŠkoda vehicle for this widget.');
        return;
      }

      try {
        const state = await HomeyInstance.api('GET', `/state?deviceId=${encodeURIComponent(deviceId)}`);
        renderState(state);
      } catch (error) {
        setMessage(error && error.message ? error.message : 'Failed to load widget data.');
      }
    }

    async function callAction(path, body) {
      const buttonIds = ['refresh-button', 'charging-button', 'climate-button'];
      buttonIds.forEach((id) => {
        document.getElementById(id).disabled = true;
      });

      try {
        if (typeof HomeyInstance.hapticFeedback === 'function') {
          HomeyInstance.hapticFeedback();
        }
        await HomeyInstance.api('POST', path, body);
        await fetchState();
      } catch (error) {
        setMessage(error && error.message ? error.message : 'Action failed.');
      } finally {
        buttonIds.forEach((id) => {
          document.getElementById(id).disabled = false;
        });
      }
    }

    function bindActions() {
      document.getElementById('refresh-button').addEventListener('click', async () => {
        const deviceId = getDeviceId();
        if (!deviceId) return;
        await callAction('/actions/refresh', { deviceId });
      });

      document.getElementById('charging-button').addEventListener('click', async () => {
        const deviceId = getDeviceId();
        if (!deviceId || !currentState) return;
        const path = currentState.isCharging ? '/actions/stop-charging' : '/actions/start-charging';
        await callAction(path, { deviceId });
      });

      document.getElementById('climate-button').addEventListener('click', async () => {
        const deviceId = getDeviceId();
        if (!deviceId || !currentState) return;
        const settings = getWidgetSettings();
        const path = currentState.climateActive ? '/actions/stop-climate' : '/actions/start-climate';
        await callAction(path, {
          deviceId,
          temperature: Number(settings.climate_temperature || 21),
        });
      });
    }

    function onHomeyReady(Homey) {
      HomeyInstance = Homey;
      bindActions();
      fetchState();
      refreshTimer = setInterval(fetchState, 30000);
      Homey.ready({ height: 260 });
    }
  </script>
</body>
</html>
