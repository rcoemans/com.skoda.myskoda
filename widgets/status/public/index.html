<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--homey-background-color, transparent);
      color: var(--homey-text-color, #333333);
    }
    .widget {
      padding: var(--homey-space-14, 14px);
      display: flex;
      flex-direction: column;
      gap: var(--homey-space-8, 8px);
      align-items: center;
      justify-content: center;
      min-height: 100%;
    }
    .status-icon {
      font-size: 28px;
    }
    .status-message {
      font-size: var(--homey-text-md-size, 15px);
      font-weight: 600;
      color: var(--homey-text-color, #333333);
      text-align: center;
    }
    .status-time {
      font-size: var(--homey-text-xs-size, 12px);
      color: var(--homey-text-color-light, rgba(0,0,0,0.5));
      text-align: center;
    }
    .error {
      color: var(--homey-color-red-500, #e74c3c);
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="status-icon" id="icon">...</div>
    <div class="status-message" id="message">Loading...</div>
    <div class="status-time" id="timestamp"></div>
  </div>

  <script type="text/javascript">
    function onHomeyReady(Homey) {
      Homey.ready({ height: 120 });

      Homey.api('GET', '/')
        .then(function(result) {
          document.getElementById('icon').textContent = '\u2705';
          document.getElementById('message').textContent = result.message || 'Widget works!';
          document.getElementById('timestamp').textContent = result.timestamp || '';
        })
        .catch(function(err) {
          document.getElementById('icon').textContent = '\u274C';
          document.getElementById('message').textContent = err.message || 'Widget error';
          document.getElementById('message').classList.add('error');
        });
    }
  </script>
</body>
</html>
