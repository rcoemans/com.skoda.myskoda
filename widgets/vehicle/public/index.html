<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root {
      color-scheme: light dark;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--homey-background-color, transparent);
      color: var(--homey-text-color, #333333);
    }

    .widget {
      padding: var(--homey-space-14, 14px);
      display: flex;
      flex-direction: column;
      gap: var(--homey-space-12, 12px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--homey-space-12, 12px);
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      font-size: var(--homey-text-xs-size, 11px);
      font-weight: var(--homey-text-xs-weight, 500);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--homey-text-color-light, rgba(0,0,0,0.5));
      margin-bottom: 2px;
    }

    .title {
      font-size: var(--homey-text-xl-size, 20px);
      font-weight: var(--homey-text-xl-weight, 700);
      line-height: var(--homey-text-xl-line-height, 1.2);
      color: var(--homey-text-color, #333333);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .connection {
      padding: 4px 10px;
      border-radius: var(--homey-border-radius-full, 999px);
      font-size: var(--homey-text-xs-size, 12px);
      font-weight: 600;
      background: var(--homey-color-mono-100, rgba(0,0,0,0.06));
      color: var(--homey-text-color-light, rgba(0,0,0,0.5));
      text-transform: capitalize;
      white-space: nowrap;
    }

    .connection.online {
      background: var(--homey-color-green-050, rgba(44,187,99,0.15));
      color: var(--homey-color-green-500, #2cbb63);
    }

    .hero {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--homey-space-14, 14px);
      align-items: center;
    }

    .battery {
      position: relative;
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }

    .battery img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .charging-overlay {
      position: absolute;
      right: -2px;
      top: -2px;
      width: 18px !important;
      height: 18px !important;
      padding: 3px;
      border-radius: var(--homey-border-radius-full, 999px);
      background: var(--homey-color-green-500, #2cbb63);
      box-shadow: 0 0 0 2px var(--homey-background-color, #ffffff);
    }

    .battery-value {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      display: flex;
      align-items: baseline;
      gap: 4px;
      color: var(--homey-text-color, #333333);
    }

    .battery-unit {
      font-size: var(--homey-text-md-size, 15px);
      font-weight: 600;
      color: var(--homey-text-color-light, rgba(0,0,0,0.5));
    }

    .hero-subtitle {
      margin-top: 6px;
      font-size: var(--homey-text-sm-size, 14px);
      color: var(--homey-text-color-light, rgba(0,0,0,0.5));
      text-transform: capitalize;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--homey-space-10, 10px);
    }

    .metric {
      display: flex;
      align-items: center;
      gap: var(--homey-space-10, 10px);
      padding: 10px 12px;
      border-radius: var(--homey-border-radius-large, 14px);
      background: var(--homey-color-mono-100, rgba(0,0,0,0.04));
      min-width: 0;
    }

    .metric-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .metric-text {
      min-width: 0;
    }

    .metric-label {
      font-size: var(--homey-text-xs-size, 11px);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--homey-text-color-light, rgba(0,0,0,0.5));
    }

    .metric-value {
      font-size: var(--homey-text-md-size, 15px);
      font-weight: 700;
      line-height: 1.2;
      color: var(--homey-text-color, #333333);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: capitalize;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--homey-space-10, 10px);
      margin-top: auto;
      font-size: var(--homey-text-xs-size, 12px);
      color: var(--homey-text-color-light, rgba(0,0,0,0.5));
    }

    .address {
      max-width: calc(100% - 110px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--homey-space-8, 8px);
    }

    .button {
      appearance: none;
      border: 0;
      cursor: pointer;
      border-radius: var(--homey-border-radius-large, 14px);
      min-height: 40px;
      padding: 10px 12px;
      font-size: var(--homey-text-sm-size, 13px);
      font-weight: 700;
      color: var(--homey-text-color, #333333);
      background: var(--homey-color-mono-100, rgba(0,0,0,0.06));
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .button.primary {
      background: var(--homey-color-blue-500, #0E3A2F);
      color: var(--homey-color-white, #ffffff);
    }

    .button:active {
      transform: scale(0.97);
    }

    .button[disabled] {
      opacity: 0.4;
      cursor: default;
    }

    .message {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      text-align: center;
      font-size: var(--homey-text-sm-size, 14px);
      color: var(--homey-text-color-light, rgba(0,0,0,0.5));
      padding: var(--homey-space-12, 12px);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 420px) {
      .title {
        font-size: 18px;
      }

      .battery-value {
        font-size: 28px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
      }

      .address {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div id="message" class="message">Loading widget...</div>

    <div id="content" class="hidden">
      <div class="header">
        <div class="title-block">
          <div class="eyebrow">MySkoda</div>
          <div class="title" id="vehicle-name">Vehicle</div>
        </div>
        <div class="connection" id="connection-status">Unknown</div>
      </div>

      <div class="hero">
        <div class="battery">
          <img id="battery-icon" src="./icons/battery-0.svg" alt="Battery">
          <img id="charging-icon" class="charging-overlay hidden" src="./icons/charging.svg" alt="Charging">
        </div>
        <div>
          <div class="battery-value">
            <span id="battery-percent">--</span>
            <span class="battery-unit">%</span>
          </div>
          <div class="hero-subtitle" id="hero-subtitle">Vehicle status unavailable</div>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <img class="metric-icon" src="./icons/range.svg" alt="Range">
          <div class="metric-text">
            <div class="metric-label">Range</div>
            <div class="metric-value" id="range-value">-- km</div>
          </div>
        </div>
        <div class="metric">
          <img class="metric-icon" id="lock-icon" src="./icons/unlock.svg" alt="Lock state">
          <div class="metric-text">
            <div class="metric-label">Lock</div>
            <div class="metric-value" id="lock-value">Unknown</div>
          </div>
        </div>
        <div class="metric">
          <img class="metric-icon" src="./icons/plug.svg" alt="Plug state">
          <div class="metric-text">
            <div class="metric-label">Plug</div>
            <div class="metric-value" id="plug-value">Unknown</div>
          </div>
        </div>
        <div class="metric">
          <img class="metric-icon" src="./icons/climate.svg" alt="Climate state">
          <div class="metric-text">
            <div class="metric-label">Climate</div>
            <div class="metric-value" id="climate-value">Unknown</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="refresh-button" class="button" type="button">Refresh</button>
        <button id="charging-button" class="button primary" type="button">Charging</button>
        <button id="climate-button" class="button" type="button">Climate</button>
      </div>

      <div class="footer">
        <div class="address" id="parking-address">No parking address</div>
        <div id="last-updated">Updated: --</div>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    let HomeyInstance;
    let currentState = null;
    let refreshTimer = null;

    function getDeviceId() {
      const ids = typeof HomeyInstance.getDeviceIds === 'function' ? HomeyInstance.getDeviceIds() : [];
      return Array.isArray(ids) && ids.length > 0 ? ids[0] : null;
    }

    function getWidgetSettings() {
      return typeof HomeyInstance.getSettings === 'function' ? (HomeyInstance.getSettings() || {}) : {};
    }

    function setMessage(text) {
      document.getElementById('message').textContent = text;
      document.getElementById('message').classList.remove('hidden');
      document.getElementById('content').classList.add('hidden');
    }

    function showContent() {
      document.getElementById('message').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
    }

    function getBatteryIcon(level) {
      if (level === null || level === undefined || Number.isNaN(Number(level))) return './icons/battery-0.svg';
      if (level <= 10) return './icons/battery-0.svg';
      if (level <= 25) return './icons/battery-1.svg';
      if (level <= 40) return './icons/battery-2.svg';
      if (level <= 60) return './icons/battery-3.svg';
      if (level <= 80) return './icons/battery-4.svg';
      return './icons/battery-5.svg';
    }

    function humanizeCharging(state) {
      if (!state) return 'Unknown';
      return String(state).replace(/_/g, ' ').replace(/\b\w/g, function(char) { return char.toUpperCase(); });
    }

    function textOrFallback(value, fallback) {
      return value === null || value === undefined || value === '' ? fallback : String(value);
    }

    function renderState(state) {
      currentState = state;
      var settings = getWidgetSettings();
      var batteryPercent = state.batteryPercent != null ? state.batteryPercent : '--';
      var charging = Boolean(state.isCharging);
      var chargingLabel = humanizeCharging(state.chargingState);
      var lastUpdatedText = state.lastUpdated ? 'Updated: ' + state.lastUpdated : 'Updated: --';
      var parkingAddress = settings.show_location === false ? 'Parking address hidden' : textOrFallback(state.parkingAddress, 'No parking address');

      document.getElementById('vehicle-name').textContent = textOrFallback(state.name, 'MySkoda');
      document.getElementById('connection-status').textContent = textOrFallback(state.connectionStatus, 'unknown');
      document.getElementById('connection-status').className = 'connection ' + String(state.connectionStatus || 'unknown').toLowerCase();
      document.getElementById('battery-percent').textContent = batteryPercent;
      document.getElementById('hero-subtitle').textContent = charging
        ? chargingLabel + (state.chargePowerKw ? ' \u00b7 ' + state.chargePowerKw + ' kW' : '')
        : chargingLabel;
      document.getElementById('battery-icon').src = getBatteryIcon(Number(state.batteryPercent));
      document.getElementById('charging-icon').classList.toggle('hidden', !charging);
      document.getElementById('range-value').textContent = state.rangeKm != null ? state.rangeKm + ' km' : '-- km';
      document.getElementById('lock-value').textContent = textOrFallback(state.lockLabel, 'Unknown');
      document.getElementById('lock-icon').src = state.locked ? './icons/lock.svg' : './icons/unlock.svg';
      document.getElementById('plug-value').textContent = textOrFallback(state.plugLabel, 'Unknown');
      document.getElementById('climate-value').textContent = state.climateActive
        ? 'Active' + (state.outsideTemperatureC != null ? ' \u00b7 ' + state.outsideTemperatureC + '\u00b0C' : '')
        : 'Off';
      document.getElementById('parking-address').textContent = parkingAddress;
      document.getElementById('last-updated').textContent = lastUpdatedText;
      document.getElementById('charging-button').textContent = charging ? 'Stop Charging' : 'Start Charging';
      document.getElementById('climate-button').textContent = state.climateActive ? 'Stop Climate' : 'Start Climate';
      showContent();
    }

    async function fetchState() {
      var deviceId = getDeviceId();
      if (!deviceId) {
        setMessage('Select a MySkoda vehicle for this widget.');
        return;
      }

      try {
        var state = await HomeyInstance.api('GET', '/state?deviceId=' + encodeURIComponent(deviceId));
        renderState(state);
      } catch (error) {
        setMessage(error && error.message ? error.message : 'Failed to load widget data.');
      }
    }

    async function callAction(path, body) {
      var buttonIds = ['refresh-button', 'charging-button', 'climate-button'];
      buttonIds.forEach(function(id) {
        document.getElementById(id).disabled = true;
      });

      try {
        if (typeof HomeyInstance.hapticFeedback === 'function') {
          HomeyInstance.hapticFeedback();
        }
        await HomeyInstance.api('POST', path, body);
        await fetchState();
      } catch (error) {
        setMessage(error && error.message ? error.message : 'Action failed.');
      } finally {
        buttonIds.forEach(function(id) {
          document.getElementById(id).disabled = false;
        });
      }
    }

    function bindActions() {
      document.getElementById('refresh-button').addEventListener('click', async function() {
        var deviceId = getDeviceId();
        if (!deviceId) return;
        await callAction('/actions/refresh', { deviceId: deviceId });
      });

      document.getElementById('charging-button').addEventListener('click', async function() {
        var deviceId = getDeviceId();
        if (!deviceId || !currentState) return;
        var path = currentState.isCharging ? '/actions/stop-charging' : '/actions/start-charging';
        await callAction(path, { deviceId: deviceId });
      });

      document.getElementById('climate-button').addEventListener('click', async function() {
        var deviceId = getDeviceId();
        if (!deviceId || !currentState) return;
        var settings = getWidgetSettings();
        var path = currentState.climateActive ? '/actions/stop-climate' : '/actions/start-climate';
        await callAction(path, {
          deviceId: deviceId,
          temperature: Number(settings.climate_temperature || 21),
        });
      });
    }

    function onHomeyReady(Homey) {
      HomeyInstance = Homey;
      Homey.ready({ height: 340 });
      bindActions();
      fetchState();
      refreshTimer = setInterval(fetchState, 30000);
    }
  </script>
</body>
</html>
