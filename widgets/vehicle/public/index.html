<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root {
      color-scheme: light dark;
      --skoda-green: #4BA82E;
      --skoda-green-light: #78FAAE;
      --skoda-green-dark: #1B5E20;
      --skoda-accent: #3D8C27;
      --gauge-size: 88px;
      --gauge-stroke: 7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--homey-background-color, #ffffff);
      color: var(--homey-text-color, #1a1a1a);
      -webkit-font-smoothing: antialiased;
    }

    .widget {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* --- Header --- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--skoda-green), var(--skoda-green-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-mark svg {
      width: 16px;
      height: 16px;
    }

    .header-text { min-width: 0; }

    .vehicle-name {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--homey-text-color, #1a1a1a);
    }

    /* --- Hero: Battery Gauge + Stats --- */
    .hero {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .gauge-container {
      position: relative;
      width: var(--gauge-size);
      height: var(--gauge-size);
      flex-shrink: 0;
    }

    .gauge-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .gauge-bg {
      fill: none;
      stroke: var(--homey-color-mono-100, rgba(0,0,0,0.06));
      stroke-width: var(--gauge-stroke);
    }

    .gauge-fill {
      fill: none;
      stroke: var(--skoda-green);
      stroke-width: var(--gauge-stroke);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s ease;
    }

    .gauge-fill.low { stroke: var(--homey-color-red-500, #e74c3c); }
    .gauge-fill.medium { stroke: var(--homey-color-orange-500, #f39c12); }
    .gauge-fill.charging {
      stroke: var(--skoda-green-light);
      filter: drop-shadow(0 0 4px rgba(120, 250, 174, 0.4));
    }

    .gauge-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .gauge-percent {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      color: var(--homey-text-color, #1a1a1a);
    }

    .gauge-percent-unit {
      font-size: 12px;
      font-weight: 600;
      color: var(--homey-text-color-light, rgba(0,0,0,0.4));
    }

    .gauge-icon {
      margin-top: 2px;
      font-size: 10px;
    }

    .hero-stats {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.55;
    }

    .stat-label {
      font-size: 11px;
      color: var(--homey-text-color-light, rgba(0,0,0,0.45));
      min-width: 50px;
    }

    .stat-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--homey-text-color, #1a1a1a);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-value.accent { color: var(--skoda-green); }

    /* --- Status Cards --- */
    .status-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .status-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 4px;
      border-radius: 12px;
      background: var(--homey-color-mono-100, rgba(0,0,0,0.03));
      text-align: center;
      transition: background 0.2s ease;
    }

    .status-card-icon {
      width: 20px;
      height: 20px;
      opacity: 0.6;
    }

    .status-card-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--homey-text-color, #1a1a1a);
      text-transform: capitalize;
      line-height: 1.2;
    }

    .status-card-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--homey-text-color-light, rgba(0,0,0,0.4));
      line-height: 1.1;
    }

    .status-card.active {
      background: rgba(75, 168, 46, 0.08);
    }

    .status-card.active .status-card-icon { opacity: 0.9; }
    .status-card.active .status-card-value { color: var(--skoda-green); }

    .status-card.warning {
      background: rgba(231, 76, 60, 0.06);
    }

    .status-card.warning .status-card-value {
      color: var(--homey-color-red-500, #e74c3c);
    }

    /* --- Action Bar --- */
    .action-bar {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .action-btn {
      flex: 1;
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 10px 6px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--homey-text-color, #1a1a1a);
      background: var(--homey-color-mono-100, rgba(0,0,0,0.05));
      transition: transform 0.1s ease, opacity 0.15s ease, background 0.15s ease;
      text-align: center;
      white-space: nowrap;
    }

    .action-btn:active { transform: scale(0.96); }
    .action-btn[disabled] { opacity: 0.35; cursor: default; }

    .action-btn.green {
      background: linear-gradient(135deg, var(--skoda-green), var(--skoda-accent));
      color: #ffffff;
    }

    .action-btn.green:active { background: var(--skoda-green-dark); }

    /* --- Footer --- */
    .footer {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-top: 6px;
      font-size: 10px;
      color: var(--homey-text-color-light, rgba(0,0,0,0.35));
    }

    .footer-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      margin-top: 1px;
      opacity: 0.5;
    }

    .footer-address {
      flex: 1;
      min-width: 0;
      line-height: 1.4;
    }

    /* --- Message / Loading --- */
    .message {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 140px;
      text-align: center;
      gap: 10px;
      padding: 16px;
    }

    .message-text {
      font-size: 13px;
      color: var(--homey-text-color-light, rgba(0,0,0,0.5));
      line-height: 1.4;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--homey-color-mono-100, rgba(0,0,0,0.08));
      border-top-color: var(--skoda-green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    @media (max-width: 380px) {
      .status-cards { grid-template-columns: repeat(2, 1fr); }
      .hero { gap: 12px; }
      .gauge-container { --gauge-size: 72px; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <!-- Loading / Error State -->
    <div id="message" class="message">
      <div class="spinner"></div>
      <div class="message-text">Loading vehicle data...</div>
    </div>

    <!-- Main Content -->
    <div id="content" class="hidden">

      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <div class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
              <path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
              <path d="M5 17h-2v-6l2-5h9l4 5h1a2 2 0 0 1 2 2v4h-2"/>
              <path d="M9 17h6"/>
              <path d="M14 6l-4 0"/>
            </svg>
          </div>
          <div class="header-text">
            <div class="vehicle-name" id="vehicle-name">MySkoda</div>
          </div>
        </div>
      </div>

      <!-- Hero: Battery Gauge + Key Stats -->
      <div class="hero">
        <div class="gauge-container">
          <svg class="gauge-ring" viewBox="0 0 100 100">
            <circle class="gauge-bg" cx="50" cy="50" r="42"/>
            <circle class="gauge-fill" id="gauge-fill" cx="50" cy="50" r="42"
                    stroke-dasharray="263.9" stroke-dashoffset="263.9"/>
          </svg>
          <div class="gauge-center">
            <div class="gauge-percent">
              <span id="battery-percent">--</span><span class="gauge-percent-unit">%</span>
            </div>
            <div class="gauge-icon" id="gauge-icon"></div>
          </div>
        </div>

        <div class="hero-stats">
          <div class="stat-row">
            <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L12 22"/><path d="M17 7L12 2L7 7"/><path d="M17 17L12 22L7 17"/></svg>
            <span class="stat-label">Range</span>
            <span class="stat-value" id="range-value">-- km</span>
          </div>
          <div class="stat-row">
            <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8l10-12h-9l1-8z"/></svg>
            <span class="stat-label">Power</span>
            <span class="stat-value" id="power-value">--</span>
          </div>
          <div class="stat-row">
            <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span class="stat-label">Time</span>
            <span class="stat-value" id="time-value">--</span>
          </div>
        </div>
      </div>

      <!-- Status Cards -->
      <div class="status-cards">
        <div class="status-card" id="card-lock">
          <svg class="status-card-icon" id="lock-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <div class="status-card-value" id="lock-value">--</div>
          <div class="status-card-label">Lock</div>
        </div>
        <div class="status-card" id="card-plug">
          <svg class="status-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v6"/><path d="M8 2v6"/><path d="M16 2v6"/>
            <path d="M6 8h12a1 1 0 0 1 1 1v2a4 4 0 0 1-4 4h-6a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1z"/>
            <path d="M10 15v5a2 2 0 0 0 4 0v-5"/>
          </svg>
          <div class="status-card-value" id="plug-value">--</div>
          <div class="status-card-label">Plug</div>
        </div>
        <div class="status-card" id="card-climate">
          <svg class="status-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 9a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
            <path d="M12 2v2"/><path d="M12 20v2"/>
            <path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/>
            <path d="M2 12h2"/><path d="M20 12h2"/>
            <path d="M4.93 19.07l1.41-1.41"/><path d="M17.66 6.34l1.41-1.41"/>
          </svg>
          <div class="status-card-value" id="climate-value">Off</div>
          <div class="status-card-label">Climate</div>
        </div>
        <div class="status-card" id="card-doors">
          <svg class="status-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 2h11a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
            <path d="M15 12h.01"/>
          </svg>
          <div class="status-card-value" id="doors-value">--</div>
          <div class="status-card-label">Doors</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-bar">
        <button id="refresh-button" class="action-btn" type="button">
          Refresh
        </button>
        <button id="charging-button" class="action-btn green" type="button">
          Charging
        </button>
        <button id="climate-button" class="action-btn" type="button">
          Climate
        </button>
      </div>

      <!-- Footer -->
      <div class="footer" id="parking-address">
        <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <div class="footer-address" id="parking-text">--</div>
      </div>

    </div>
  </div>

  <script type="text/javascript">
    var HomeyInstance;
    var currentState = null;
    var refreshTimer = null;
    var CIRCUMFERENCE = 2 * Math.PI * 42; // matches SVG r=42

    function getDeviceId() {
      var ids = typeof HomeyInstance.getDeviceIds === 'function' ? HomeyInstance.getDeviceIds() : [];
      return Array.isArray(ids) && ids.length > 0 ? ids[0] : null;
    }

    function getWidgetSettings() {
      return typeof HomeyInstance.getSettings === 'function' ? (HomeyInstance.getSettings() || {}) : {};
    }

    function setMessage(text, showSpinner) {
      var msgEl = document.getElementById('message');
      msgEl.querySelector('.message-text').textContent = text;
      msgEl.querySelector('.spinner').style.display = showSpinner ? '' : 'none';
      msgEl.classList.remove('hidden');
      document.getElementById('content').classList.add('hidden');
    }

    function showContent() {
      document.getElementById('message').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
    }

    function txt(v, fb) {
      return v == null || v === '' ? fb : String(v);
    }

    function setGauge(pct, isCharging) {
      var el = document.getElementById('gauge-fill');
      var clamped = Math.max(0, Math.min(100, Number(pct) || 0));
      var offset = CIRCUMFERENCE - (clamped / 100) * CIRCUMFERENCE;
      el.style.strokeDashoffset = offset;

      el.classList.remove('low', 'medium', 'charging');
      if (isCharging) el.classList.add('charging');
      else if (clamped <= 15) el.classList.add('low');
      else if (clamped <= 30) el.classList.add('medium');
    }

    function renderState(state) {
      currentState = state;
      var settings = getWidgetSettings();
      var pct = state.batteryPercent;
      var charging = Boolean(state.isCharging);

      // Header
      document.getElementById('vehicle-name').textContent = txt(state.name, 'MySkoda');

      // Gauge
      document.getElementById('battery-percent').textContent = pct != null ? pct : '--';
      setGauge(pct, charging);
      document.getElementById('gauge-icon').textContent = charging ? '\u26A1' : '';

      // Hero stats
      document.getElementById('range-value').textContent = state.rangeKm != null ? state.rangeKm + ' km' : '--';
      var powerText = state.chargePowerKw != null ? state.chargePowerKw + ' kW' : '--';
      document.getElementById('power-value').textContent = powerText;
      if (charging) document.getElementById('power-value').classList.add('accent');
      else document.getElementById('power-value').classList.remove('accent');
      var timeText = state.remainingChargeMinutes != null
        ? (state.remainingChargeMinutes >= 60
          ? Math.floor(state.remainingChargeMinutes / 60) + 'h ' + (state.remainingChargeMinutes % 60) + 'm'
          : state.remainingChargeMinutes + ' min')
        : '--';
      document.getElementById('time-value').textContent = timeText;

      // Status cards
      var lockCard = document.getElementById('card-lock');
      var locked = state.locked;
      document.getElementById('lock-value').textContent = locked === true ? 'Locked' : locked === false ? 'Unlocked' : '--';
      lockCard.className = 'status-card' + (locked === true ? ' active' : locked === false ? ' warning' : '');

      // Update lock icon SVG: locked = closed padlock, unlocked = open padlock
      var lockSvg = document.getElementById('lock-icon-svg');
      if (locked === true) {
        lockSvg.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
      } else if (locked === false) {
        lockSvg.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 5-5 5 5 0 0 1 5 5"/>';
      }

      var plugCard = document.getElementById('card-plug');
      var plugged = state.chargerConnected;
      document.getElementById('plug-value').textContent = plugged === true ? 'Connected' : plugged === false ? 'Disconnected' : '--';
      plugCard.className = 'status-card' + (plugged === true ? ' active' : '');

      var climateCard = document.getElementById('card-climate');
      var climateOn = state.climateActive;
      document.getElementById('climate-value').textContent = climateOn
        ? 'On' + (state.outsideTemperatureC != null ? ' ' + state.outsideTemperatureC + '\u00b0' : '')
        : 'Off';
      climateCard.className = 'status-card' + (climateOn ? ' active' : '');

      var doorsCard = document.getElementById('card-doors');
      var doorsOpen = state.doorsOpen;
      document.getElementById('doors-value').textContent = doorsOpen === true ? 'Open' : doorsOpen === false ? 'Closed' : '--';
      doorsCard.className = 'status-card' + (doorsOpen === true ? ' warning' : doorsOpen === false ? '' : '');

      // Action buttons
      document.getElementById('charging-button').textContent = charging ? 'Stop Charge' : 'Charge';
      document.getElementById('climate-button').textContent = climateOn ? 'Stop Climate' : 'Climate';

      // Footer
      var addr = settings.show_location === false ? 'Location hidden' : txt(state.parkingAddress, '');
      document.getElementById('parking-text').textContent = addr;
      document.getElementById('parking-address').style.display = addr ? '' : 'none';

      showContent();
    }

    async function fetchState() {
      var deviceId = getDeviceId();
      if (!deviceId) {
        setMessage('Select a MySkoda vehicle for this widget.', false);
        return;
      }

      try {
        var state = await HomeyInstance.api('GET', '/state?deviceId=' + encodeURIComponent(deviceId));
        renderState(state);
      } catch (error) {
        setMessage(error && error.message ? error.message : 'Failed to load data.', false);
      }
    }

    async function callAction(path, body) {
      var btns = document.querySelectorAll('.action-btn');
      btns.forEach(function(b) { b.disabled = true; });

      try {
        if (typeof HomeyInstance.hapticFeedback === 'function') HomeyInstance.hapticFeedback();
        await HomeyInstance.api('POST', path, body);
        await fetchState();
      } catch (error) {
        setMessage(error && error.message ? error.message : 'Action failed.', false);
      } finally {
        btns.forEach(function(b) { b.disabled = false; });
      }
    }

    function bindActions() {
      document.getElementById('refresh-button').addEventListener('click', async function() {
        var deviceId = getDeviceId();
        if (!deviceId) return;
        await callAction('/actions/refresh', { deviceId: deviceId });
      });

      document.getElementById('charging-button').addEventListener('click', async function() {
        var deviceId = getDeviceId();
        if (!deviceId || !currentState) return;
        var path = currentState.isCharging ? '/actions/stop-charging' : '/actions/start-charging';
        await callAction(path, { deviceId: deviceId });
      });

      document.getElementById('climate-button').addEventListener('click', async function() {
        var deviceId = getDeviceId();
        if (!deviceId || !currentState) return;
        var settings = getWidgetSettings();
        var path = currentState.climateActive ? '/actions/stop-climate' : '/actions/start-climate';
        await callAction(path, {
          deviceId: deviceId,
          temperature: Number(settings.climate_temperature || 21),
        });
      });
    }

    function onHomeyReady(Homey) {
      HomeyInstance = Homey;
      Homey.ready({ height: 440 });
      bindActions();
      fetchState();
      refreshTimer = setInterval(fetchState, 30000);
    }
  </script>
</body>
</html>
